<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flexi Customer Service</title>
<style>
    :root { --navy-blue: #000080; --light-gray: #f4f4f4; }

    /* Fix body to use dynamic viewport height for mobile browsers */
    body { 
        margin: 0; 
        font-family: Arial, sans-serif; 
        display: flex; 
        flex-direction: column; 
        height: 100dvh; 
        overflow: hidden; 
    }
    
    .header { 
        background-color: #fff; 
        border-bottom: 1px solid #ddd; 
        padding: 15px; 
        display: flex; 
        align-items: center; 
        gap: 10px; 
        flex-shrink: 0; 
    }
    
    .profile-pic { width: 40px; height: 40px; background: #ccc; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    
    /* min-height: 0 allows this element to shrink to fit the screen */
    .chat-area { 
        flex: 1; 
        overflow-y: auto; 
        padding: 15px; 
        background-color: #fff; 
        width: 100%; 
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        min-height: 0; 
    }

    .message { padding: 10px 15px; border-radius: 10px; margin-bottom: 10px; max-width: 75%; word-wrap: break-word; font-size: 14px; }
    .bot-message { background-color: var(--light-gray); color: #333; }
    .user-message { background-color: var(--navy-blue); color: white; margin-left: auto; }
    .system-message { text-align: center; color: #888; font-size: 0.75em; margin: 10px 0; font-style: italic; }
    
    .typing-dots { display: flex; gap: 3px; padding: 8px 12px; background: var(--light-gray); border-radius: 15px; width: fit-content; }
    .dot { width: 6px; height: 6px; background: #888; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    
    .agent-container { display: flex; gap: 8px; margin-bottom: 10px; align-items: flex-start; }
    .agent-avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .agent-name { font-size: 0.75em; color: #555; font-weight: bold; margin-bottom: 2px; }

    /* Input area stays fixed at the bottom */
    .input-area { 
        padding: 8px; 
        border-top: 1px solid #eee; 
        display: flex; 
        align-items: center; 
        gap: 5px; 
        background: #fff; 
        width: 100%; 
        box-sizing: border-box; 
        flex-shrink: 0; 
    }
    
    input { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 20px; outline: none; background: #f9f9f9; font-size: 14px; }
    .icon-btn { border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #555; padding: 4px; }
    .send-btn { background-color: var(--navy-blue); border-radius: 50%; padding: 7px; color: white; border: none; cursor: pointer; flex-shrink: 0; }
    
    #preview-container {
        transition: all 0.2s ease;
        flex-shrink: 0;
    }
</style>


</head>
<body>
    <header class="header">
        <div class="profile-pic">CS</div>
        <div><strong>Customer Service</strong><br><small style="font-size: 11px;">The team can also help</small></div>
    </header>
    <div id="chat-container" class="chat-area">
        <div class="message bot-message">Hello, how may I help you today? 😊</div>
    </div>
    
<div id="preview-container" style="display:none; padding: 10px; background: #fff; border-top: 1px solid #eee;">
    <img id="image-preview" style="max-width: 60px; height: 60px; border-radius: 10px; object-fit: cover; border: 2px solid #ddd;">
</div>

<div class="input-area">
    <button class="icon-btn" onclick="document.getElementById('file-input').click()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
    </button>
    
    <input type="file" id="file-input" style="display:none" accept="image/*">

    <button class="icon-btn" style="font-weight:bold; font-size: 9px; border: 1px solid #555; border-radius: 3px; padding: 1px 3px;">GIF</button>
    
    <input id="user-input" type="text" placeholder="Message...">
    
    <button class="icon-btn" id="mic-btn" onclick="toggleRecording()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
        </svg>
    </button>

    <button class="send-btn" onclick="sendMessage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
    </button>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* =========================
   FIREBASE SETUP
========================= */
const firebaseConfig = {
    apiKey: "AIzaSyA0bM6pk1T1peGSS7quvFPEMOMuplnNRNM",
    authDomain: "waec2026jamb2027.firebaseapp.com",
    projectId: "waec2026jamb2027"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* =========================
   GLOBAL VARIABLES
========================= */
const container = document.getElementById("chat-container");
const input = document.getElementById("user-input");
const previewContainer = document.getElementById("preview-container");
const imagePreview = document.getElementById("image-preview");

let currentUser = null;
let pendingAttachment = null;
let isConnected = false;

/* =========================
   AUTH STATE
========================= */
onAuthStateChanged(auth, (user) => {
    if (user) {
        currentUser = user;
        console.log(
            "Chat active for:",
            user.displayName || user.email
        );
    }
});

/* =========================
   SEND MESSAGE
========================= */
window.sendMessage = async function(text) {

    const message = text || input.value;

    if (!message.trim() && !pendingAttachment) return;

    let messageHtml = `<div class="message user-message">`;

    if (pendingAttachment) {
        messageHtml += `
        <img src="${pendingAttachment}"
             style="max-width:100%;
             border-radius:10px;
             display:block;
             margin-bottom:5px;">`;
    }

    messageHtml += `${message}</div>`;

    container.innerHTML += messageHtml;
    input.value = "";

    const payload = {
        prompt: message,
        image: pendingAttachment,
        userId: currentUser ? currentUser.uid : "guest",
        userName: currentUser
            ? (currentUser.displayName || currentUser.email)
            : "Student"
    };

    pendingAttachment = null;

    if (previewContainer) {
        previewContainer.style.display = "none";
    }

    container.scrollTop = container.scrollHeight;

    /* =========================
       JOIN ANIMATION
    ========================= */
    if (!isConnected) {

        container.innerHTML += `
        <div id="waiting-bar"
             class="system-message">
             Waiting for a teammate...
        </div>`;

        container.scrollTop = container.scrollHeight;

        await new Promise(r => setTimeout(r, 2000));

        const waitingBar =
            document.getElementById("waiting-bar");

        if (waitingBar) waitingBar.remove();

        container.innerHTML += `
        <div class="system-message">
            <strong>Jarvis</strong>
            joined the conversation
        </div>`;

        isConnected = true;
    }

    const typingId = "jarvis-typing-" + Date.now();

    container.innerHTML += `
    <div class="agent-container"
         id="${typingId}">
        <img
        src="https://i.postimg.cc/DZmnnjjP/image-ff6a8a52.png"
        class="agent-avatar"
        alt="Jarvis">

        <div class="typing-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>`;

    container.scrollTop = container.scrollHeight;

    try {

        const response = await fetch(
            "https://flexieduconsult-ai-link-a5d8.onrender.com/admission-help",
            {
                method: "POST",
                headers: {
                    "Content-Type":
                    "application/json"
                },
                body: JSON.stringify(payload)
            }
        );

        const data = await response.json();

        const typing =
            document.getElementById(typingId);

        if (typing) typing.remove();

        container.innerHTML += `
        <div class="agent-container">
            <img
            src="https://i.postimg.cc/DZmnnjjP/image-ff6a8a52.png"
            class="agent-avatar"
            alt="Jarvis">

            <div>
                <div class="agent-name">
                    Jarvis
                </div>

                <div class="message bot-message">
                    ${data.response}
                </div>
            </div>
        </div>`;

    } catch (error) {

        const typing =
            document.getElementById(typingId);

        if (typing) typing.remove();

        container.innerHTML += `
        <div class="message bot-message">
            Sorry, I am currently offline.
        </div>`;
    }

    container.scrollTop = container.scrollHeight;
};

/* =========================
   ENTER KEY
========================= */
input.addEventListener("keypress", (e) => {
    if (e.key === "Enter") {
        sendMessage();
    }
});

/* =========================
   FILE UPLOAD
========================= */
const fileInput =
document.getElementById("file-input");

if (fileInput) {

    fileInput.onchange = (e) => {

        const file = e.target.files[0];

        if (!file) return;

        const reader = new FileReader();

        reader.onload = (event) => {

            pendingAttachment =
                event.target.result;

            imagePreview.src =
                event.target.result;

            previewContainer.style.display =
                "block";
        };

        reader.readAsDataURL(file);
    };
}

/* =========================
   SPEECH RECOGNITION
========================= */
let recognition = null;
let isListening = false;

if (
    "webkitSpeechRecognition" in window ||
    "SpeechRecognition" in window
) {

    const SpeechRecognition =
        window.SpeechRecognition ||
        window.webkitSpeechRecognition;

    recognition = new SpeechRecognition();

    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = (event) => {

        let transcript = "";

        for (
            let i = event.resultIndex;
            i < event.results.length;
            i++
        ) {

            transcript +=
                event.results[i][0].transcript;
        }

        input.value = transcript;
    };

    recognition.onend = () => {

        isListening = false;

        const micBtn =
            document.getElementById("mic-btn");

        if (micBtn) {
            micBtn.style.color = "#555";
        }
    };
}

/* =========================
   TOGGLE RECORDING
========================= */
window.toggleRecording = function() {

    if (!recognition) {

        alert(
          "Speech recognition not supported."
        );

        return;
    }

    const micBtn =
        document.getElementById("mic-btn");

    if (isListening) {

        recognition.stop();

    } else {

        input.value = "";

        recognition.start();

        isListening = true;

        if (micBtn) {
            micBtn.style.color = "red";
        }
    }
};

</script>
</body>
</html>
