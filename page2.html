<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Flexi CBT | Subject Selection</title>

    <style>
        :root {
            --blue: #003366;
            --green: #2E8B57;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #ffffff;
            display: none;
        }

        header {
            background: var(--blue);
            color: white;
            padding: 12px 10px;
            border-bottom: 8px solid var(--green);
            text-align: center;
        }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header-logo {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
        }

        header h1 {
            margin: 0;
            font-size: 0.95rem;
            text-transform: uppercase;
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 15px;
        }

        /* AD BANNER */
        .ad-banner {
            width: 100%;
            height: 85px;
            display: block;
            overflow: hidden;
            border-radius: 6px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            background: #f5f5f5;
        }

        .ad-banner img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .welcome-msg h2 {
            color: var(--blue);
            margin: 0;
            font-size: 1.2rem;
            text-align: center;
        }

        .welcome-msg p {
            color: #555;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 15px;
        }

        .mode-section {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .mode-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--blue);
            margin-bottom: 8px;
            display: block;
        }

        .subject-list,
        .mode-list {
            display: flex;
            flex-direction: column;
        }

        .sub-row {
            display: flex;
            align-items: center;
            padding: 8px 0;
            cursor: pointer;
            user-select: none;
        }

        .sub-row input {
            margin-right: 10px;
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        .sub-row span {
            font-size: 0.95rem;
            color: #333;
        }

        .sub-row.locked {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* BUTTONS */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
            margin-bottom: 20px;
        }

        .btn-change,
        .btn-proceed {
            border: none;
            padding: 14px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-change {
            flex: 1;
            background: #666;
            color: white;
        }

        .btn-proceed {
            flex: 2;
            background: var(--green);
            color: white;
        }

        .btn-proceed:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

<header>
    <div class="header-container">
        <img src="https://i.postimg.cc/0Qm3PLw5/1771700279759-2.jpg" alt="Logo" class="header-logo">
        <h1>FLEXI EDUCATIONAL CONSULT</h1>
    </div>
</header>

<div class="container">

    <!-- AD BANNER -->
    <a href="#" class="ad-banner">
        <img src="https://i.postimg.cc/XvkqQc3F/20260418-185555-2.jpg" alt="Advertisement">
    </a>

    <!-- WELCOME -->
    <div class="welcome-msg">
        <h2 id="exam-title">Subject Selection</h2>
        <p>Pick your mode and 3 other subjects</p>
    </div>

    <!-- EXAM MODE -->
    <div class="mode-section">
        <span class="mode-title">Select Exam Mode:</span>

        <div class="mode-list">
            <label class="sub-row">
                <input type="radio" name="examMode" value="Practice" checked>
                <span>Practice Mode (50 mins)</span>
            </label>

            <label class="sub-row">
                <input type="radio" name="examMode" value="Full">
                <span>Full Exam Mode (2 hrs)</span>
            </label>
        </div>
    </div>

    <!-- SUBJECTS -->
    <form class="subject-list" id="subjectForm">

        <label class="sub-row locked">
            <input type="checkbox" checked disabled>
            <span>English Language</span>
        </label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Account" onchange="validateSelection()"><span>Account</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Agric" onchange="validateSelection()"><span>Agricultural Science</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Animal Husbandry" onchange="validateSelection()"><span>Animal Husbandry</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Arabic" onchange="validateSelection()"><span>Arabic</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Biology" onchange="validateSelection()"><span>Biology</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Catering" onchange="validateSelection()"><span>Catering Craft Practice</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Chemistry" onchange="validateSelection()"><span>Chemistry</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="CRS" onchange="validateSelection()"><span>Christian Religious Studies (CRS)</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Book Keeping" onchange="validateSelection()"><span>Book Keeping</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Civic" onchange="validateSelection()"><span>Civic Education</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Commerce" onchange="validateSelection()"><span>Commerce</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Computer Studies" onchange="validateSelection()"><span>Computer Studies</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Data Processing" onchange="validateSelection()"><span>Data Processing</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Economics" onchange="validateSelection()"><span>Economics</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Fine Arts" onchange="validateSelection()"><span>Fine Arts</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Food and Nutrition" onchange="validateSelection()"><span>Food and Nutrition</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="French" onchange="validateSelection()"><span>French</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Further Maths" onchange="validateSelection()"><span>Further Mathematics</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Geography" onchange="validateSelection()"><span>Geography</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Government" onchange="validateSelection()"><span>Government</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Hausa" onchange="validateSelection()"><span>Hausa</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="History" onchange="validateSelection()"><span>History</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Home Economics" onchange="validateSelection()"><span>Home Economics</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Igbo" onchange="validateSelection()"><span>Igbo</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Insurance" onchange="validateSelection()"><span>Insurance</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Home Management" onchange="validateSelection()"><span>Home Management</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="IRK" onchange="validateSelection()"><span>Islamic Religious Knowledge (IRK)</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Literature In English" onchange="validateSelection()"><span>Literature In English</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Marketing" onchange="validateSelection()"><span>Marketing</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Mathematics" onchange="validateSelection()"><span>Mathematics</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Music" onchange="validateSelection()"><span>Music</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Office Practice" onchange="validateSelection()"><span>Office Practice</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Physical Education" onchange="validateSelection()"><span>Physical Education</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Physics" onchange="validateSelection()"><span>Physics</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Technical Drawing" onchange="validateSelection()"><span>Technical Drawing</span></label>

        <label class="sub-row"><input type="checkbox" name="subject" value="Yoruba" onchange="validateSelection()"><span>Yoruba</span></label>

    </form>

    <!-- BUTTONS -->
    <div class="btn-group">
        <button type="button" class="btn-change" onclick="window.location.href='cbt.html'">
            Change Simulator
        </button>

        <button type="button" id="proceed-btn" class="btn-proceed" disabled onclick="saveAndMove()">
            Proceed to Instructions
        </button>
    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyA0bM6pk1T1peGSS7quvFPEMOMuplnNRNM",
    authDomain: "waec2026jamb2027.firebaseapp.com",
    projectId: "waec2026jamb2027"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const currentExamType =
    localStorage.getItem("selectedExamType") || "JAMB";

onAuthStateChanged(auth, (user) => {

    if (user) {

        document.body.style.display = "block";

        document.getElementById("exam-title").innerText =
            currentExamType + " Selection";

    } else {

        window.location.href = "login.html";

    }

});

window.validateSelection = () => {

    const checkboxes =
        document.querySelectorAll('input[name="subject"]');

    const checkedCount =
        Array.from(checkboxes).filter(c => c.checked).length;

    // JAMB => only 3 subjects allowed
    if (currentExamType === "JAMB") {

        checkboxes.forEach(c => {

            if (checkedCount >= 3 && !c.checked) {
                c.disabled = true;
            } else {
                c.disabled = false;
            }

        });

        document.getElementById("proceed-btn").disabled =
            checkedCount !== 3;

    } else {

        // WAEC / NECO
        document.getElementById("proceed-btn").disabled =
            checkedCount === 0;

    }

};

window.saveAndMove = () => {

    const checked =
        document.querySelectorAll('input[name="subject"]:checked');

    const subjectKeys =
        Array.from(checked).map(c => c.value);

    const mode =
        document.querySelector('input[name="examMode"]:checked').value;

    let finalSubjects;

    if (currentExamType === "JAMB") {

        finalSubjects = [
            "English Language",
            ...subjectKeys
        ];

    } else {

        finalSubjects = subjectKeys;

    }

    localStorage.setItem(
        "userSubjectKeys",
        JSON.stringify(finalSubjects)
    );

    localStorage.setItem("examMode", mode);

    window.location.href = "page3.html";

};

</script>

</body>
</html>
