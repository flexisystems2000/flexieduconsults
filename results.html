<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exam Results | Flexi CBT</title>
    <style>
        :root { --blue: #003366; --green: #2E8B57; --gray: #f8f9fa; --gold: #FFD700; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--gray); margin: 0; padding-bottom: 40px; color: #333; }

        /* Branding Header */
        header { 
            background: var(--blue); color: white; padding: 12px 15px; 
            border-bottom: 10px solid var(--green); box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: sticky; top: 0; z-index: 1000;
        }
        .header-container { display: flex; align-items: center; justify-content: center; max-width: 600px; margin: 0 auto; gap: 10px; }
        .header-logo { width: 32px; height: 32px; object-fit: contain; }
        header h1 { margin: 0; font-size: 1.05rem; letter-spacing: 0.3px; text-transform: uppercase; font-weight: 700; }

        .container { width: 100%; max-width: 500px; margin: 20px auto; padding: 0 15px; }

        /* Main Result Card */
        .result-card { 
            background: white; padding: 25px; border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; margin-bottom: 25px;
        }
        
        .score-circle { 
            width: 120px; height: 120px; border-radius: 50%; 
            border: 8px solid var(--green); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; margin: 0 auto 15px; 
            font-weight: bold; color: var(--blue); 
        }
        .score-circle span { font-size: 2rem; }
        .score-circle small { font-size: 0.7rem; text-transform: uppercase; }

        /* Score Table */
        .score-table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 0.9rem; }
        .score-table th { text-align: left; color: #666; font-weight: 600; padding: 8px; border-bottom: 2px solid #eee; }
        .score-table td { padding: 12px 8px; border-bottom: 1px solid #f5f5f5; text-align: left; }
        .score-table b { color: var(--green); }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        button { 
            padding: 14px; border: none; border-radius: 10px; 
            font-weight: bold; cursor: pointer; font-size: 0.85rem; transition: 0.2s; 
        }
        .btn-primary { background: var(--blue); color: white; }
        .btn-outline { background: #f0f0f0; color: #444; }

        /* Leaderboard Section */
        .leaderboard-section { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .leaderboard-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; color: var(--blue); }
        .rank-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 0; border-bottom: 1px solid #eee; font-size: 0.9rem;
        }
        .rank-row:last-child { border-bottom: none; }
        .rank-info { display: flex; align-items: center; gap: 12px; }
        .rank-num { width: 24px; font-weight: bold; color: #999; }
        .top-rank { color: var(--green); }
        .rank-score { font-weight: 700; color: var(--blue); }
    </style>
</head>
<body>

<header>
    <div class="header-container">
        <img src="https://via.placeholder.com/50x50?text=Logo" alt="Logo" class="header-logo">
        <h1>FLEXI EDUCATIONAL CONSULT</h1>
    </div>
</header>

<div class="container">
    <div class="result-card">
        <h2 id="exam-title" style="margin:0 0 5px; font-size: 1.2rem; color: var(--blue);">Performance Report</h2>
        <p id="user-display" style="margin: 0 0 20px; font-size: 0.85rem; color: #888;">Candidate Name</p>

        <div class="score-circle">
            <span id="final-percent">0%</span>
            <small>Score</small>
        </div>

        <table class="score-table">
            <thead>
                <tr>
                    <th>Subject</th>
                    <th style="text-align: right;">Score</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>

        <div class="btn-grid">
            <button class="btn-primary" onclick="location.href='corrections.html'">VIEW CORRECTIONS</button>
            <button class="btn-outline" onclick="location.href='index.html'">NEW EXAM</button>
        </div>
    </div>

    <div class="leaderboard-section">
        <div class="leaderboard-header">
            <span style="font-size: 1.5rem;">🏆</span>
            <h3 style="margin: 0;">Global Leaderboard</h3>
        </div>
        <div id="leaderboard-list">
            <p style="text-align: center; color: #999; font-size: 0.8rem;">Fetching top candidates...</p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getDatabase, ref, get, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyA0bM6pk1T1peGSS7quvFPEMOMuplnNRNM", 
        authDomain: "waec2026jamb2027.firebaseapp.com", 
        databaseURL: "https://waec2026jamb2027-default-rtdb.firebaseio.com",
        projectId: "waec2026jamb2027" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('user-display').innerText = user.displayName || "Candidate";
            loadData();
            loadLeaderboard();
        } else {
            window.location.href = "login.html";
        }
    });

    function loadData() {
        const examName = localStorage.getItem("displayExamName") || "JAMB";
        const userAnswers = JSON.parse(localStorage.getItem("finalAnswers") || "{}");
        const examData = JSON.parse(localStorage.getItem("examQuestions") || "{}");
        
        document.getElementById('exam-title').innerText = examName + " Results";

        let totalCorrect = 0, totalQ = 0, rows = "";

        Object.keys(examData).forEach(sub => {
            let correct = 0;
            examData[sub].forEach((q, i) => {
                if (userAnswers[sub] && userAnswers[sub][i] === q.answer) correct++;
            });
            totalCorrect += correct;
            totalQ += examData[sub].length;

            rows += `<tr><td>${sub}</td><td style="text-align: right;"><b>${correct}</b> / ${examData[sub].length}</td></tr>`;
        });

        const percent = totalQ > 0 ? Math.round((totalCorrect / totalQ) * 100) : 0;
        document.getElementById('final-percent').innerText = percent + "%";
        document.getElementById('table-body').innerHTML = rows;
    }

    async function loadLeaderboard() {
        const listDiv = document.getElementById('leaderboard-list');
        try {
            const boardRef = query(ref(db, 'leaderboard'), orderByChild('score'), limitToLast(10));
            const snap = await get(boardRef);
            
            if (snap.exists()) {
                let ranks = [];
                snap.forEach(child => { ranks.push(child.val()); });
                ranks.sort((a, b) => b.score - a.score);

                listDiv.innerHTML = ranks.map((entry, i) => `
                    <div class="rank-row">
                        <div class="rank-info">
                            <span class="rank-num ${i < 3 ? 'top-rank' : ''}">${i + 1}</span>
                            <span style="font-weight: 500;">${entry.name}</span>
                        </div>
                        <span class="rank-score">${entry.score}%</span>
                    </div>
                `).join('');
            } else {
                listDiv.innerHTML = "<p style='text-align:center; font-size:0.8rem;'>No data available.</p>";
            }
        } catch (e) {
            listDiv.innerHTML = "<p style='text-align:center; font-size:0.8rem;'>Connection error.</p>";
        }
    }
</script>
</body>
</html>
