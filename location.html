<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Centers | Flexi Tutors</title>
    <style>
        :root { --blue: #003366; --green: #2E8B57; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #fff; }
        
        header { 
            background: var(--blue); color: white; height: 1cm; 
            display: flex; align-items: center; padding: 0 15px; 
            border-bottom: 4px solid var(--green);
        }

        .container { max-width: 500px; margin: 20px auto; width: 90%; }
        
        .selector-card { padding: 20px; border: 1px solid #eee; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid var(--blue); font-size: 1rem; }

        .center-card { 
            padding: 15px; border-bottom: 1px solid #eee; 
            display: flex; flex-direction: column; gap: 5px;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

        .c-name { color: var(--blue); font-weight: bold; font-size: 1.1rem; }
        .c-addr { color: #555; font-size: 0.9rem; line-height: 1.4; }
        .c-tag { font-size: 0.7rem; color: var(--green); font-weight: bold; text-transform: uppercase; }
        
        #no-results { display: none; text-align: center; color: #999; margin-top: 40px; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 0.85rem; font-weight: bold;">FLEXI TUTORIAL CENTERS</div>
</header>

<div class="container">
    <div class="selector-card">
        <p style="margin-top: 0; font-weight: bold; color: var(--blue);">Where are you located?</p>
        <select id="lga-picker" onchange="fetchNearbyCenters()">
            <option value="">-- Select Local Government --</option>
            <option value="Agege">Agege</option><option value="Ajeromi-Ifelodun">Ajeromi-Ifelodun</option>
            <option value="Alimosho">Alimosho</option><option value="Amuwo-Odofin">Amuwo-Odofin</option>
            <option value="Apapa">Apapa</option><option value="Badagry">Badagry</option>
            <option value="Epe">Epe</option><option value="Eti-Osa">Eti-Osa</option>
            <option value="Ibeju-Lekki">Ibeju-Lekki</option><option value="Ifako-Ijaiye">Ifako-Ijaiye</option>
            <option value="Ikeja">Ikeja</option><option value="Ikorodu">Ikorodu</option>
            <option value="Kosofe">Kosofe</option><option value="Lagos Island">Lagos Island</option>
            <option value="Lagos Mainland">Lagos Mainland</option><option value="Mushin">Mushin</option>
            <option value="Ojo">Ojo</option><option value="Oshodi-Isolo">Oshodi-Isolo</option>
            <option value="Shomolu">Shomolu</option><option value="Surulere">Surulere</option>
        </select>
    </div>

    <div id="results-list"></div>
    <div id="no-results">
        <img src="https://via.placeholder.com/100?text=!" style="opacity: 0.3;">
        <p>No centers found in this L.G.A yet.<br>Check back soon!</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA0bM6pk1T1peGSS7quvFPEMOMuplnNRNM",
        authDomain: "waec2026jamb2027.firebaseapp.com",
        projectId: "waec2026jamb2027",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.fetchNearbyCenters = async () => {
        const lga = document.getElementById('lga-picker').value;
        const list = document.getElementById('results-list');
        const empty = document.getElementById('no-results');

        if(!lga) {
            list.innerHTML = "";
            empty.style.display = "none";
            return;
        }

        list.innerHTML = "<p style='text-align:center;'>Searching...</p>";
        
        // Query Firestore for centers matching the selected LGA
        const q = query(collection(db, "centers"), where("lga", "==", lga));
        const snap = await getDocs(q);

        list.innerHTML = "";
        
        if(snap.empty) {
            empty.style.display = "block";
        } else {
            empty.style.display = "none";
            snap.forEach(doc => {
                const data = doc.data();
                list.innerHTML += `
                    <div class="center-card">
                        <span class="c-tag">L.G.A: ${data.lga}</span>
                        <span class="c-name">${data.name}</span>
                        <span class="c-addr">${data.address}</span>
                    </div>
                `;
            });
        }
    }
</script>
</body>
</html>
