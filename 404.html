<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>404 - Page Not Found</title>

<style>

body{

    margin:0;
    padding:0;

    font-family:Arial, sans-serif;

    background:#f5f7fb;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;

    text-align:center;

}

.container{

    max-width:500px;
    padding:20px;

}

h1{

    font-size:100px;
    margin:0;

    color:#1e3a8a;

}

h2{

    margin-top:10px;
    color:#111827;

}

p{

    color:#6b7280;
    line-height:1.6;

}

a{

    display:inline-block;

    margin-top:20px;
    padding:12px 24px;

    background:#1e3a8a;
    color:white;

    text-decoration:none;

    border-radius:8px;

    transition:0.3s;

}

a:hover{

    opacity:0.9;

}

</style>

</head>

<body>

<div class="container">

<h1>404</h1>

<h2>Page Not Found</h2>

<p>

Sorry, the page you are looking for
does not exist or has been moved.

</p>

<a href="/">

Go Back Home

</a>

</div>

</body>

</html>
