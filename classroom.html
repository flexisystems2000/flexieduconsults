<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexi Tutors | Hub</title>
    <style>
        :root { --blue: #003366; --green: #2E8B57; --bg: #f4f7f6; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        
        header { 
            background: var(--blue); color: white; height: 1cm; 
            display: flex; align-items: center; padding: 0 15px; 
            border-bottom: 4px solid var(--green); position: sticky; top: 0; z-index: 1000;
        }
        .header-logo { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: bold; }
        .header-logo img { height: 0.7cm; border-radius: 3px; }

        .container { max-width: 600px; margin: 20px auto; width: 92%; }

        /* CREATION & TABS */
        .create-box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .btn-create { background: var(--blue); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        
        .nav-tabs { display: flex; gap: 10px; margin-top: 20px; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; background: #e0e0e0; color: #555; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { background: var(--blue); color: white; }

        /* LISTS */
        .view-content { display: none; }
        .view-content.active { display: block; }
        .group-list { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
        .item { background: white; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .item-name { color: var(--blue); font-weight: 700; font-size: 0.95rem; }
        .btn-action { border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 0.75rem; cursor: pointer; background: var(--green); color: white; }

        /* CHAT INTERFACE */
        #page-chat { display: none; background: white; min-height: 100vh; flex-direction: column; }
        #comment-feed { flex: 1; padding: 15px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 80px; }
        .comment { display: flex; gap: 10px; }
        .comment-content { background: #f0f2f5; padding: 10px 15px; border-radius: 15px; max-width: 80%; }
        .comment-user { font-size: 0.7rem; font-weight: bold; color: var(--green); margin-bottom: 2px; }
        .input-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 1px solid #eee; padding: 10px; display: flex; gap: 10px; box-sizing: border-box; }
        .input-bar input { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 20px; outline: none; }
    </style>
</head>
<body>

<div id="page-groups">
    <header>
        <div class="header-logo">
            <img src="https://i.postimg.cc/0Qm3PLw5/1771700279759-2.jpg" alt="Logo">
            <span>Flexi Group Hub</span>
        </div>
    </header>

    <div class="container">
        <div class="create-box">
            <h3 style="margin: 0 0 10px 0; color: var(--blue); font-size: 0.9rem;">Start a Discussion</h3>
            <input type="text" id="new-group-name" placeholder="E.g. JAMB Maths 2026..." style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
            <button class="btn-create" onclick="handleCreateGroup()">CREATE GROUP</button>

            <div class="nav-tabs">
                <button class="tab-btn active" id="btn-groups" onclick="switchTab('groups')">GROUPS</button>
                <button class="tab-btn" id="btn-chats" onclick="switchTab('chats')">CHATS</button>
            </div>
        </div>

        <div id="view-groups" class="view-content active">
            <div id="group-list-container" class="group-list"></div>
        </div>

        <div id="view-chats" class="view-content">
            <div id="user-list-container" class="group-list"></div>
        </div>
    </div>
</div>

<div id="page-chat">
    <header>
        <div class="header-logo">
            <span onclick="backToGroups()" style="cursor: pointer; font-size: 1.2rem; margin-right: 10px;">❮</span>
            <span id="active-title">Discussion</span>
        </div>
    </header>
    <div id="comment-feed"></div>
    <div class="input-bar">
        <input type="text" id="chat-msg-input" placeholder="Type a message...">
        <button class="btn-post" onclick="postComment()" style="background:var(--blue); color:white; border:none; padding:0 20px; border-radius:20px; font-weight:bold; cursor:pointer;">SEND</button>
    </div>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, setDoc, doc, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    console.log("Script is running!");

    const firebaseConfig = {
        apiKey: "AIzaSyA0bM6pk1T1peGSS7quvFPEMOMuplnNRNM",
        authDomain: "flexieduconsult.com.ng",
        projectId: "waec2026jamb2027",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentId = null;
    let currentType = "groups";
    let unsubscribeMessages = null;
    let joinedGroupIds = new Set();

    const getUsername = () => auth.currentUser ? (auth.currentUser.displayName || auth.currentUser.email.split('@')[0]) : "Student";

    // 1. Auth & Sync
    onAuthStateChanged(auth, async (user) => {
    if (user) {
        // This acts as a "Check-in". It adds them to the list 
        // the moment they open the app.
        await setDoc(doc(db, "profiles", user.uid), { 
            name: user.displayName || user.email.split('@')[0],
            email: user.email,
            lastSeen: new Date() // Helpful for future features
        }, { merge: true });
        
        loadAllGroups();
        loadAllUsers();
    }
});


    // 2. Tab Navigation
    window.switchTab = (tab) => {
        document.getElementById('btn-groups').classList.toggle('active', tab === 'groups');
        document.getElementById('btn-chats').classList.toggle('active', tab === 'chats');
        document.getElementById('view-groups').classList.toggle('active', tab === 'groups');
        document.getElementById('view-chats').classList.toggle('active', tab === 'chats');
    };

    // 3. Load Groups
    window.loadAllGroups = () => {
        onSnapshot(query(collection(db, "groups"), orderBy("createdAt", "desc")), (snap) => {
            const container = document.getElementById('group-list-container');
            container.innerHTML = "";
            snap.forEach(docSnap => {
                const g = docSnap.data();
                container.innerHTML += `
                    <div class="item">
                        <div>
                            <div class="item-name">${g.name}</div>
                            <div style="font-size:0.7rem; color:#888;">Admin: ${g.creator}</div>
                        </div>
                        <button class="btn-action" onclick="enterRoom('${docSnap.id}', '${g.name}', 'groups')">ENTER</button>
                    </div>`;
            });
        });
    };

    // 4. Load Users (Messenger List)
    window.loadAllUsers = () => {
    onSnapshot(collection(db, "profiles"), (snap) => {
        const container = document.getElementById('user-list-container');
        container.innerHTML = "";
        
        snap.forEach(doc => {
            const u = doc.data();
            // REMOVED the login safeguard: This will show everyone in the 'profiles' collection
            container.innerHTML += `
                <div class="item" style="cursor:pointer;" onclick="startDirectChat('${doc.id}', '${u.name}')">
                    <span class="item-name">${u.name}</span>
                    <span style="font-size:0.7rem; color:var(--green);">MESSAGE ❯</span>
                </div>`;
        });
    });
};


    // 5. Chat Engine
    window.enterRoom = (id, name, type) => {
        currentId = id;
        currentType = type;
        document.getElementById('page-groups').style.display = "none";
        document.getElementById('page-chat').style.display = "flex";
        document.getElementById('active-title').innerText = name;
        
        if (unsubscribeMessages) unsubscribeMessages();
        unsubscribeMessages = onSnapshot(query(collection(db, currentType, currentId, "messages"), orderBy("timestamp", "asc")), (snap) => {
            const feed = document.getElementById('comment-feed');
            feed.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                feed.innerHTML += `<div class="comment"><div class="comment-content"><div class="comment-user">${m.sender}</div><div class="comment-text">${m.text}</div></div></div>`;
            });
            window.scrollTo(0, document.body.scrollHeight);
        });
    };

    window.startDirectChat = (otherUid, name) => {
        const chatId = [auth.currentUser.uid, otherUid].sort().join("_");
        enterRoom(chatId, name, "direct_chats");
    };

    window.postComment = async () => {
        if (!auth.currentUser) return window.location.href = "login.html";
        const input = document.getElementById('chat-msg-input');
        if (!input.value.trim()) return;
        await addDoc(collection(db, currentType, currentId, "messages"), {
            sender: getUsername(),
            text: input.value.trim(),
            timestamp: serverTimestamp()
        });
        input.value = "";
    };
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, setDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA0bM6pk1T1peGSS7quvFPEMOMuplnNRNM",
        authDomain: "flexieduconsult.com.ng",
        projectId: "waec2026jamb2027",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentId = null;
    let currentType = "groups";
    let unsubscribeMessages = null;
    let joinedGroupIds = new Set();

    const getUsername = () => auth.currentUser ? (auth.currentUser.displayName || auth.currentUser.email.split('@')[0]) : "Student";

    // 1. AUTH & DATA SYNC
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            await setDoc(doc(db, "profiles", user.uid), { 
                name: getUsername(), 
                email: user.email 
            }, { merge: true });
            
            const snapshot = await getDocs(collection(db, "user_groups"));
            joinedGroupIds = new Set(); 
            snapshot.forEach(d => {
                if (d.id.startsWith(user.uid)) joinedGroupIds.add(d.data().groupId);
            });
        }
        loadAllGroups();
        loadAllUsers();
    });

    // 2. LOAD GROUPS (Using lowercase 'groups')
    window.loadAllGroups = () => {
        onSnapshot(query(collection(db, "groups"), orderBy("createdAt", "desc")), (snap) => {
            const container = document.getElementById('group-list-container');
            container.innerHTML = "";
            snap.forEach(docSnap => {
                const g = docSnap.data();
                const isMember = joinedGroupIds.has(docSnap.id);
                container.innerHTML += `
                    <div class="item">
                        <div><div class="item-name">${g.name}</div></div>
                        ${isMember 
                            ? `<button class="btn-action" onclick="enterRoom('${docSnap.id}', '${g.name}', 'groups')">ENTER</button>`
                            : `<button class="btn-action" style="background:var(--green)" onclick="joinAndEnter('${docSnap.id}', '${g.name}')">JOIN</button>`
                        }
                    </div>`;
            });
        });
    };

    // 3. LOAD USERS
    window.loadAllUsers = () => {
        onSnapshot(collection(db, "profiles"), (snap) => {
            const container = document.getElementById('user-list-container');
            container.innerHTML = "";
            snap.forEach(doc => {
                if (auth.currentUser && doc.id === auth.currentUser.uid) return;
                const u = doc.data();
                container.innerHTML += `
                    <div class="item" style="cursor:pointer;" onclick="startDirectChat('${doc.id}', '${u.name}')">
                        <span class="item-name">${u.name}</span>
                    </div>`;
            });
        });
    };

    // 4. ENTER ROOM
    window.enterRoom = (id, name, type) => {
        currentId = id;
        currentType = type;
        document.getElementById('page-groups').style.display = "none";
        document.getElementById('page-chat').style.display = "flex";
        document.getElementById('active-title').innerText = name;
        
        if (unsubscribeMessages) unsubscribeMessages();
        
        unsubscribeMessages = onSnapshot(query(collection(db, currentType, currentId, "messages"), orderBy("timestamp", "asc")), (snap) => {
            const feed = document.getElementById('comment-feed');
            feed.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                feed.innerHTML += `<div class="comment"><div class="comment-content"><div class="comment-user">${m.sender}</div><div class="comment-text">${m.text}</div></div></div>`;
            });
            window.scrollTo(0, document.body.scrollHeight);
        });
    };

    window.joinAndEnter = async (id, name) => {
        await setDoc(doc(db, "user_groups", `${auth.currentUser.uid}_${id}`), { groupId: id });
        joinedGroupIds.add(id);
        enterRoom(id, name, 'groups');
    };

    window.startDirectChat = (otherUid, name) => {
        const chatId = [auth.currentUser.uid, otherUid].sort().join("_");
        enterRoom(chatId, name, "direct_chats");
    };

    window.postComment = async () => {
        if (!auth.currentUser) return;
        const input = document.getElementById('chat-msg-input');
        if (!input.value.trim()) return;
        await addDoc(collection(db, currentType, currentId, "messages"), {
            sender: getUsername(),
            text: input.value.trim(),
            timestamp: serverTimestamp()
        });
        input.value = "";
    };
    
    window.backToGroups = () => {
        if (unsubscribeMessages) unsubscribeMessages();
        document.getElementById('page-groups').style.display = "block";
        document.getElementById('page-chat').style.display = "none";
    };
</script>
</body>
</html>
