<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexi Tutors | Group Hub</title>
    <style>
        :root { --blue: #003366; --green: #2E8B57; --bg: #f4f7f6; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        header { 
            background: var(--blue); color: white; height: 1cm; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 15px; border-bottom: 4px solid var(--green);
            position: sticky; top: 0; z-index: 1000;
        }
        .header-logo { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: bold; }
        .header-logo img { height: 0.7cm; border-radius: 3px; }

        .container { max-width: 600px; margin: 20px auto; width: 92%; }

        /* GROUP LIST STYLES */
        .create-box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .btn-create { background: var(--blue); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        
        .group-list { display: flex; flex-direction: column; gap: 12px; }
        .group-item { 
            background: white; padding: 15px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid #eee;
        }
        .group-name { color: var(--blue); font-weight: 700; font-size: 1rem; }
        .group-meta { font-size: 0.75rem; color: #888; }
        
        .btn-action { 
            border: none; padding: 8px 20px; border-radius: 20px; 
            font-weight: bold; font-size: 0.8rem; cursor: pointer; transition: 0.2s;
        }
        .btn-join { background: var(--green); color: white; }
        .btn-enter { background: var(--blue); color: white; }

        /* CHAT ROOM STYLES */
        #page-chat { display: none; background: white; min-height: 100vh; flex-direction: column; }
        #comment-feed { flex: 1; padding: 15px; display: flex; flex-direction: column; gap: 20px; padding-bottom: 80px; }
        .comment { display: flex; gap: 12px; animation: fadeIn 0.3s ease; }
        .user-avatar { width: 35px; height: 35px; background: #eef2f7; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--blue); flex-shrink: 0; border: 1px solid #ddd; font-size: 0.8rem; }
        .comment-content { flex: 1; background: #f8f9fa; padding: 10px 15px; border-radius: 0 15px 15px 15px; }
        .comment-user { font-weight: bold; font-size: 0.75rem; color: var(--green); margin-bottom: 4px; }
        .comment-text { font-size: 0.9rem; color: #333; line-height: 1.4; }
        .comment-img { width: 100%; max-width: 300px; border-radius: 8px; margin-top: 8px; }
        .comment-time { font-size: 0.65rem; color: #bbb; margin-top: 5px; display: block; text-align: right; }

        .input-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 1px solid #eee; padding: 10px 15px; display: flex; align-items: center; gap: 10px; box-sizing: border-box; }
        .input-bar input[type="text"] { flex: 1; border: 1px solid #eee; background: #f8f8f8; padding: 12px 15px; border-radius: 20px; outline: none; }
        .btn-post { background: var(--blue); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="page-groups">
    <header>
        <div class="header-logo">
            <img src="https://i.postimg.cc/0Qm3PLw5/1771700279759-2.jpg" alt="Logo">
            <span>Flexi Group Hub</span>
        </div>
    </header>

    <div class="container">
        <div class="create-box">
            <h3 style="margin: 0; color: var(--blue); font-size: 0.9rem;">Start a Discussion</h3>
            <input type="text" id="new-group-name" placeholder="E.g. JAMB Maths 2026..." style="width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
            <button class="btn-create" onclick="handleCreateGroup()">CREATE GROUP</button>
        </div>

        <h3 style="color: var(--blue); font-size: 0.8rem; text-transform: uppercase; margin-bottom: 15px;">Available Groups</h3>
        <div id="group-list-container" class="group-list">
            <p style="text-align: center; color: #999;">Loading classrooms...</p>
        </div>
    </div>
</div>

<div id="page-chat">
    <header>
        <div class="header-logo">
            <span onclick="backToGroups()" style="cursor: pointer; font-size: 1.2rem; margin-right: 10px;">❮</span>
            <span id="active-title">Discussion</span>
        </div>
    </header>
    <div id="comment-feed"></div>
    <div class="input-bar">
        <label for="chat-image-input" style="cursor:pointer; font-size: 1.4rem;">📷</label>
        <input type="file" id="chat-image-input" hidden accept="image/*">
        <input type="text" id="chat-msg-input" placeholder="Type a message...">
        <button class="btn-post" onclick="postComment()">SEND</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, setDoc, doc, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA0bM6pk1T1peGSS7quvFPEMOMuplnNRNM",
        authDomain: "waec2026jamb2027.firebaseapp.com",
        projectId: "waec2026jamb2027",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentGroupId = null;
    let unsubscribeMessages = null;
    let joinedGroupIds = new Set(); // Store joined IDs here

    const getUsername = () => auth.currentUser ? (auth.currentUser.displayName || auth.currentUser.email.split('@')[0]) : "Student";

    // 1. Initial Load & Auth Check
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            // Fetch what the user has already joined
            const q = query(collection(db, "user_groups"), where("userId", "==", user.uid));
            const snap = await getDocs(q);
            snap.forEach(d => joinedGroupIds.add(d.data().groupId));

            // URL Auto-Join check
            const urlParams = new URLSearchParams(window.location.search);
            const autoJoinId = urlParams.get('join');
            if (autoJoinId) {
                enterRoom(autoJoinId, "Joined Group");
                window.history.replaceState({}, document.title, "groups.html");
            }
        }
        loadAllGroups(); // Now load the visual list
    });

    // 2. Load the UI List
    function loadAllGroups() {
        onSnapshot(query(collection(db, "groups"), orderBy("createdAt", "desc")), (snap) => {
            const container = document.getElementById('group-list-container');
            container.innerHTML = "";
            snap.forEach(docSnap => {
                const g = docSnap.data();
                const gId = docSnap.id;
                const isMember = joinedGroupIds.has(gId);

                container.innerHTML += `
                    <div class="group-item">
                        <div>
                            <div class="group-name">${g.name}</div>
                            <div class="group-meta">Admin: ${g.creator}</div>
                        </div>
                        ${isMember 
                            ? `<button class="btn-action btn-enter" onclick="enterRoom('${gId}', '${g.name}')">ENTER</button>`
                            : `<button class="btn-action btn-join" onclick="joinAndEnter('${gId}', '${g.name}')">JOIN</button>`
                        }
                    </div>`;
            });
        });
    }

    window.joinAndEnter = async (groupId, groupName) => {
        if (!auth.currentUser) return alert("Please login");
        try {
            await setDoc(doc(db, "user_groups", `${auth.currentUser.uid}_${groupId}`), {
                userId: auth.currentUser.uid,
                groupId: groupId,
                groupName: groupName,
                joinedAt: serverTimestamp()
            });
            joinedGroupIds.add(groupId); // Update local set immediately
            enterRoom(groupId, groupName);
        } catch (e) { enterRoom(groupId, groupName); }
    };

    window.enterRoom = (id, name) => {
        currentGroupId = id;
        document.getElementById('page-groups').style.display = "none";
        document.getElementById('page-chat').style.display = "flex";
        document.getElementById('active-title').innerText = name;
        loadComments(id);
    };

    window.backToGroups = () => {
        if (unsubscribeMessages) unsubscribeMessages();
        document.getElementById('page-groups').style.display = "block";
        document.getElementById('page-chat').style.display = "none";
    };

    window.handleCreateGroup = async () => {
        const nameInput = document.getElementById('new-group-name');
        if (!nameInput.value.trim()) return;
        await addDoc(collection(db, "groups"), {
            name: nameInput.value.trim(),
            creator: getUsername(),
            createdAt: serverTimestamp()
        });
        nameInput.value = "";
    };

    function loadComments(groupId) {
        if (unsubscribeMessages) unsubscribeMessages();
        const q = query(collection(db, "groups", groupId, "messages"), orderBy("timestamp", "asc"));
        unsubscribeMessages = onSnapshot(q, (snap) => {
            const feed = document.getElementById('comment-feed');
            feed.innerHTML = "";
            snap.forEach(docSnap => {
                const m = docSnap.data();
                feed.innerHTML += `
                    <div class="comment">
                        <div class="user-avatar">${m.sender.charAt(0).toUpperCase()}</div>
                        <div class="comment-content">
                            <div class="comment-user">${m.sender}</div>
                            <div class="comment-text">${m.text || ""}</div>
                            ${m.imgUrl ? `<img src="${m.imgUrl}" class="comment-img" onclick="window.open('${m.imgUrl}')">` : ""}
                            <span class="comment-time">${m.timestamp ? new Date(m.timestamp.seconds*1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '...'}</span>
                        </div>
                    </div>`;
            });
            window.scrollTo(0, document.body.scrollHeight);
        });
    }

    window.postComment = async () => {
        const textInput = document.getElementById('chat-msg-input');
        const fileInput = document.getElementById('chat-image-input');
        const text = textInput.value.trim();
        const file = fileInput.files[0];
        if (!text && !file) return;

        let imgUrl = null;
        if (file) {
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", "my_preset_123"); 
            const res = await fetch("https://api.cloudinary.com/v1_1/dwmbgd9jy/image/upload", { method: "POST", body: formData });
            const data = await res.json();
            imgUrl = data.secure_url;
        }

        await addDoc(collection(db, "groups", currentGroupId, "messages"), {
            sender: getUsername(),
            text: text,
            imgUrl: imgUrl,
            timestamp: serverTimestamp()
        });
        textInput.value = "";
        fileInput.value = "";
    };
</script>
</body>
</html>
